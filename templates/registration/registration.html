{% extends 'base.html' %}
{% load crispy_forms_tags static %}
{% block title %}Register | NyondoStock{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-6 col-xl-5">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold mb-2">Create your account</h1>
                        <p class="text-muted mb-0">Register to start tracking your stock and sales.</p>
                    </div>
                    <form method="POST" novalidate>
                        {% csrf_token %}
                        {{ form | crispy }}
                        <button type="submit" class="btn btn-success w-100 mt-3">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
