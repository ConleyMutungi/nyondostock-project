{% extends 'base.html' %}

{% block title %}
    Logged Out
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm border-0 rounded-4 text-center p-4">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="bi bi-box-arrow-right display-4 text-primary"></i>
                    </div>
                    <h2 class="h4 fw-bold mb-2">Signed out successfully</h2>
                    <p class="text-muted mb-4">You have been logged out of your account. Come back anytime to manage your stock and sales.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">Login again</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
