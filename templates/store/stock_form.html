{% extends 'base.html' %}
{% load crispy_forms_tags static %}

{% block title %}Edit Stock{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}

{% block content %}
<div class="container my-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="h5 mb-3">Edit Stock Item</h3>
            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form | crispy }}
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'stock_detail' stock.id %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const quantityField = document.getElementById('id_quantity');
    const unitCostField = document.getElementById('id_unit_cost');
    const totalCostField = document.getElementById('id_total_cost');

    function updateTotalCost() {
        const quantity = parseFloat(quantityField?.value) || 0;
        const unitCost = parseFloat(unitCostField?.value) || 0;
        if (totalCostField) {
            totalCostField.value = (quantity * unitCost).toFixed(2);
        }
    }

    quantityField?.addEventListener('input', updateTotalCost);
    unitCostField?.addEventListener('input', updateTotalCost);
    updateTotalCost();
});
</script>
{% endblock %}
