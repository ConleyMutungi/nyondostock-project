{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Restock Item{% endblock %}

{% block content %}
<div class="container my-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="h5 mb-3">Restock {{ stock.name }}</h3>
            <p class="text-muted">Add inventory and optionally update pricing for this item.</p>
            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form | crispy }}
                <div class="mt-3">
                    <button type="submit" class="btn btn-success">Apply Restock</button>
                    <a href="{% url 'stock_detail' stock.id %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
